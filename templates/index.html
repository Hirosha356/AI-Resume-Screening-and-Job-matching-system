
<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screener</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AI Resume Screening System</h1>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <label>Enter Job Description / Recruiter Requirements</label>
            <textarea name="job_description" required></textarea>

            <label>Upload Resumes (PDF)</label>
            <input type="file" name="resumes" multiple required>

            <button type="submit">Analyze Resumes</button>
        </form>
    </div>
</body>
</html>
